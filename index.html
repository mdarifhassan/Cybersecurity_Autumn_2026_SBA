<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Cybersecurity Autumn 2026 SBA</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    header {
      background: #111827;
      color: white;
      padding: 24px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    header p {
      margin-top: 8px;
      font-size: 18px;
    }

    .container {
      max-width: 1300px;
      margin: 50px auto;
      padding: 20px;
    }

    .folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 24px;
      margin-bottom: 35px;
    }

    .folder {
      background: white;
      border-radius: 16px;
      padding: 35px 20px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      transition: 0.2s ease;
      border: 2px solid transparent;
    }

    .folder:hover {
      transform: translateY(-5px);
      border-color: #2563eb;
    }

    .folder-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .folder-title {
      font-weight: bold;
      font-size: 18px;
    }

    .special-folder {
      background: #eff6ff;
      border: 2px solid #2563eb;
    }

    .special-folder:hover {
      background: #dbeafe;
      border-color: #1d4ed8;
    }

    .special-folder .folder-title {
      color: #2563eb;
    }

    .info-box {
      background: white;
      padding: 35px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      min-height: 220px;
    }

    .info-box h2 {
      margin-top: 0;
      color: #2563eb;
      font-size: 30px;
    }

    .info-box p {
      font-size: 20px;
      line-height: 1.7;
    }

    footer {
      text-align: center;
      padding: 25px;
      color: #6b7280;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 24px;
      }

      .container {
        margin: 25px auto;
      }

      .folder {
        padding: 25px 15px;
      }

      .info-box h2 {
        font-size: 24px;
      }

      .info-box p {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Cybersecurity Autumn 2026 SBA</h1>
    <p>Click a folder to view information</p>
  </header>

  <main class="container">

    <div class="folder-grid">

      <div class="folder" onclick="showInfo(1)">
        <div class="folder-icon">📁</div>
        <div class="folder-title">Version 1</div>
      </div>

      <div class="folder" onclick="showInfo(2)">
        <div class="folder-icon">📁</div>
        <div class="folder-title">Version 2</div>
      </div>

      <div class="folder" onclick="showInfo(3)">
        <div class="folder-icon">📁</div>
        <div class="folder-title">Version 3</div>
      </div>

      <div class="folder" onclick="showInfo(4)">
        <div class="folder-icon">📁</div>
        <div class="folder-title">Version 4</div>
      </div>

      <div class="folder" onclick="showInfo(5)">
        <div class="folder-icon">📁</div>
        <div class="folder-title">Version 5</div>
      </div>

      <div class="folder" onclick="showInfo(6)">
        <div class="folder-icon">📁</div>
        <div class="folder-title">Version 6</div>
      </div>

      <div class="folder special-folder" onclick="showInfo(7)">
        <div class="folder-icon">⭐</div>
        <div class="folder-title">Special Consideration</div>
      </div>

    </div>

    <div class="info-box" id="infoBox">
      <h2>Welcome</h2>
      <p>Please click one of the folders above to see its information.</p>
    </div>

  </main>

  <footer>
    <p>© 2026 Cybersecurity Autumn 2026 SBA</p>
  </footer>

  <script>
    const folderInfo = {
      1: {
        title: "Version 1",
        text: "This is the information for Version 1. You can write details, notes, descriptions, links, or instructions here."
      },
      2: {
        title: "Version 2",
        text: "This is the information for Version 2. Replace this text with your own content."
      },
      3: {
        title: "Version 3",
        text: "This is the information for Version 3. You can add project details, research information, or file descriptions here."
      },
      4: {
        title: "Version 4",
        text: "This is the information for Version 4. Add anything you want people to read after clicking this folder."
      },
      5: {
        title: "Version 5",
        text: "This is the information for Version 5. You can describe this version clearly here."
      },
      6: {
        title: "Version 6",
        text: "This is the information for Version 6. You can also include links, contact details, or additional notes."
      },
      7: {
        title: "Special Consideration",
        text: "This section contains special consideration information. Add any important notes, exceptional cases, extra instructions, special requirements, or special assessment details here."
      }
    };

    function showInfo(versionNumber) {
      const infoBox = document.getElementById("infoBox");
      const info = folderInfo[versionNumber];

      infoBox.innerHTML = `
        <h2>${info.title}</h2>
        <p>${info.text}</p>
      `;
    }
  </script>

</body>
</html>
